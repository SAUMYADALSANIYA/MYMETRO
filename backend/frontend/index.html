<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Metro | Ticket Booking</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/auth.css">

    <style>
        /* Extra styling for homepage */
        .home-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
            width: 420px;
        }

        .home-container h1 {
            color: #1e3c72;
            margin-bottom: 15px;
        }

        .home-container p {
            margin-bottom: 25px;
            color: #333;
        }

        .home-buttons a {
            display: block;
            text-decoration: none;
            background: #1e3c72;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .home-buttons a:hover {
            background: #16315e;
        }
    </style>
</head>

<body>

    <div class="home-container">
        <h1>Welcome to My Metro</h1>
        <p>Book metro tickets quickly, safely, and easily.</p>

        <div class="home-buttons">
            <a href="/auth/login.html">Login</a>
            <a href="/auth/signup.html">Sign Up</a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        if (!token) {
          window.location.href = "login.html";
        }
      </script>
      

</body>
</html>
